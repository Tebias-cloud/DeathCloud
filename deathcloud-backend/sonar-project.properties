# Identificador único de tu proyecto en SonarQube
sonar.projectKey=deathcloud-backend
sonar.projectName=Deathcloud Backend

# Versión del proyecto (opcional)
sonar.projectVersion=1.0.0

# Directorio a escanear (. significa el directorio actual)
sonar.sources=.

# Exclusiones: carpetas que NO queremos analizar (para que sea rápido y no de falsos positivos)
sonar.exclusions=node_modules/**, **/*.test.js, coverage/**, fix-pm2.js, pm2-logs.js, reset-remote.js, deploy-manual.js, check_db.js, check_db.cjs, check_db2.cjs, fix_db.js, test_analytics.cjs, test_report.pdf
sonar.coverage.exclusions=**/*

# Formato de codificación de los archivos
sonar.sourceEncoding=UTF-8

# Le indicamos que el lenguaje principal es JavaScript
sonar.language=js
